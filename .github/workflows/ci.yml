name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: dormant_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: Host=localhost;Port=5432;Database=dormant_test;Username=postgres;Password=password

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: '**/Directory.Packages.props'

      - name: Restore dependencies
        run: dotnet restore Dormant.slnx

      - name: Build
        run: dotnet build Dormant.slnx -c Release --no-restore

      - name: Lint check
        run: dotnet format Dormant.slnx --verify-no-changes --severity warn

      - name: Run tests
        run: dotnet test Dormant.slnx -c Release --no-build --logger "GitHubActions;summary.includePassedTests=true;summary.includeSkippedTests=true"

      - name: Publish AOT Smoke Tests
        run: dotnet publish tests/Dormant.Aot.SmokeTests/Dormant.Aot.SmokeTests.csproj -r linux-x64 -c Release /p:PublishAot=true -o ./publish-aot

      - name: Run AOT Smoke Tests
        run: ./publish-aot/Dormant.Aot.SmokeTests

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
