name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: dormant_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: Host=localhost;Port=5432;Database=dormant_test;Username=postgres;Password=password

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: '**/Directory.Packages.props'

      - name: Restore dependencies
        run: dotnet restore Dormant.slnx

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build Dormant.slnx -c Release --no-restore

      - name: Format check (CSharpier)
        run: dotnet csharpier check .

      - name: Lint check (dotnet format)
        # dotnet format compiles in Debug and runs the source generator to resolve generated
        # types. A Release-only build leaves the Debug compilation without them (CS0246), so
        # build Debug first, then verify formatting without re-restoring.
        run: |
          dotnet build Dormant.slnx --no-restore
          dotnet format Dormant.slnx --no-restore --verify-no-changes --severity warn

      - name: Run tests
        # TUnit runs on Microsoft.Testing.Platform; on .NET 10 the MTP `dotnet test` (opted in via
        # global.json) takes --solution, not a positional path, and does not use VSTest --logger.
        run: dotnet test --solution Dormant.slnx -c Release --no-build

      - name: Publish AOT Smoke Tests
        # PublishAot is set in the project; passing it on the CLI makes it a global property that
        # also hits the netstandard2.0 source generator (NETSDK1207). Let the csproj own it.
        run: dotnet publish tests/Dormant.Aot.SmokeTests/Dormant.Aot.SmokeTests.csproj -r linux-x64 -c Release -o ./publish-aot

      - name: Run AOT Smoke Tests
        run: ./publish-aot/Dormant.Aot.SmokeTests

      - name: Benchmark smoke (BenchmarkDotNet Dry job)
        # Exercises the comparative ORM benchmark suite (Dormant vs Dapper, EF Core, Insight.Database over
        # in-memory SQLite) end to end without the multi-minute full measurement (Constitution IV/VI).
        # The Dry job runs each benchmark once; this is a "does it run" smoke, not a performance gate.
        run: dotnet run -c Release --project tests/Dormant.Benchmarks -- --filter '*' --job dry

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**'
          if-no-files-found: ignore

  grammar:
    # Feature 011: validate the portable DormantQL grammar (Tree-sitter + TextMate) as
    # first-class tooling per Constitution Principle IV/VI. Auxiliary to the .NET build, so it
    # runs as its own lightweight job (no .NET, no Postgres).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate DormantQL grammar
        working-directory: tooling/grammar
        run: bash validate-grammar.sh
