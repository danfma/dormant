name: CI

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # TUnit runs on Microsoft.Testing.Platform; execute each test project directly (the .NET 10 SDK
      # no longer supports the legacy VSTest `dotnet test` path). Docker is available on ubuntu runners
      # for the Testcontainers-backed provider tests.
      - name: Test (TUnit / Microsoft.Testing.Platform)
        run: ./build.sh test
        env:
          CONFIGURATION: Release

  # AOT smoke gate (SC-001/SC-006): publish the smoke harness with full trimming + Native AOT and
  # fail on any library-originated trimming/AOT warning. Wired fully in US6 (T088).
  aot-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Publish AOT smoke harness
        # TreatWarningsAsErrors in the csproj makes any trimming/AOT warning fail this publish (the gate).
        run: |
          sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
          dotnet publish tests/Dormant.Aot.SmokeTests/Dormant.Aot.SmokeTests.csproj \
            -c Release -r linux-x64 -p:PublishAot=true -p:TrimMode=full
