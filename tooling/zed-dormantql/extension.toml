schema_version = 1

id = "dormantql"
name = "DormantQL"
version = "0.1.0"
description = "Syntax highlighting and language support for DormantQL (.dql and .dqls files)"
authors = ["Dormant Team"]
repository = "https://github.com/danfma/dormant"

# Zed clones the grammar from a git repository at a specific commit and compiles its
# src/parser.c — it does NOT support local/file:// grammar paths. Because the grammar
# lives in a subdirectory of this monorepo, we point `repository` at the repo, `path` at
# the grammar subdir, and pin `commit` to a SHA that is PUSHED to GitHub and contains
# tooling/grammar/dormantql-tree-sitter/src/parser.c.
[grammars.dormantql]
repository = "https://github.com/danfma/dormant"
path = "tooling/grammar/dormantql-tree-sitter"
# Pinned to a pushed commit that contains tooling/grammar/dormantql-tree-sitter/src/parser.c.
# Bump this whenever the grammar changes (regenerate parser.c, push, update SHA).
commit = "027e06a0604816e6537adfa91c420e84ac338459"
